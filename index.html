<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Discovery Brief</title>
  <link rel="stylesheet" href="briefStyle.css">
</head>
<body>

  <!-- Header -->
  <header class="brief-header">
    <div class="header-left">
      <h1>BRAND DISCOVERY<br><span>BRIEF.</span></h1>
    </div>
    <div class="header-right">
      <img src="Logopic.png" alt="Logo">
      <p>Mohamed Ali Louati</p>
      <p>Brand Identity Designer</p>
    </div>
  </header>

  <!-- Form -->
  <main class="brief-form">

    <!-- Section 1 -->
    <section class="brief-section">
      <h2><ion-icon name="person-outline"></ion-icon> Client Details</h2>
      <div class="fields-grid">

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="clientName" placeholder=" ">
            <label for="clientName">Client's Name</label>
          </div>
        </div>

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="company" placeholder=" ">
            <label for="company">Company Name</label>
          </div>
        </div>

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="phone" placeholder=" ">
            <label for="phone">Phone</label>
          </div>
        </div>

        <div class="field">
          <div class="input-wrap">
            <input type="email" id="email" placeholder=" ">
            <label for="email">Email</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <input type="text" id="website" placeholder=" ">
            <label for="website">Website</label>
          </div>
        </div>

      </div>
    </section>

    <!-- Section 2 -->
    <section class="brief-section">
      <h2><ion-icon name="briefcase-outline"></ion-icon> Project Details</h2>
      <div class="fields-grid">

        <div class="field full">
          <label class="static-label">Do you have a logo?</label>
          <div class="radio-group">
            <label><input type="radio" name="logo" value="yes"> Yes</label>
            <label><input type="radio" name="logo" value="no"> No</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="tagline" placeholder=" "></textarea>
            <label for="tagline">Is there a tagline or call to action?</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="guide" placeholder=" "></textarea>
            <label for="guide">Is there a brand style-guide?</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="appear" placeholder=" "></textarea>
            <label for="appear">Where will the graphics appear?</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="cues" placeholder=" "></textarea>
            <label for="cues">Are there visual cues or motifs?</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="competition" placeholder=" "></textarea>
            <label for="competition">What competition are you benchmarking against?</label>
          </div>
        </div>

      </div>
    </section>

    <!-- Section 3 -->
    <section class="brief-section">
      <h2><ion-icon name="stats-chart-outline"></ion-icon> Project Parameters</h2>
      <div class="fields-grid">

        <div class="field full">
          <div class="input-wrap">
            <textarea id="goal" placeholder=" "></textarea>
            <label for="goal">Objective / Goal of the Project</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="audience" placeholder=" "></textarea>
            <label for="audience">Target Audience</label>
          </div>
        </div>

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="deadline" placeholder=" ">
            <label for="deadline">Deadlines / Timeline</label>
          </div>
        </div>

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="budget" placeholder=" ">
            <label for="budget">Budget</label>
          </div>
        </div>

      </div>
    </section>

    <!-- Button -->
    <div class="brief-submit">
      <button onclick="sendBrief()">
        <ion-icon name="send-outline"></ion-icon>
        Send Brief
      </button>
    </div>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="Script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>
</html>
