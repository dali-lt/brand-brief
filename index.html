<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Discovery Brief</title>
  <link rel="stylesheet" href="briefStyle.css">
</head>
<body>

  <header class="brief-header">
    <div class="header-left">
      <h1>BRAND DISCOVERY<br><span>BRIEF.</span></h1>
    </div>
    <div class="header-right">
      <img src="Logopic.png" alt="Logo">
      <p>Mohamed Ali Louati</p>
      <p>Brand Identity Designer</p>
    </div>
  </header>

  <!-- Lang Button -->
  <button class="lang-btn" onclick="toggleLang()" id="langBtn">
    <ion-icon name="language-outline"></ion-icon>
    <span>AR</span>
  </button>

  <main class="brief-form">

    <!-- Section 1 — Client Info -->
    <section class="brief-section">
      <h2><ion-icon name="person-outline"></ion-icon> Client Info</h2>
      <div class="fields-grid">

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="clientName" placeholder=" ">
            <label for="clientName">Client's Name</label>
          </div>
        </div>

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="company" placeholder=" ">
            <label for="company">Company Name</label>
          </div>
        </div>

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="phone" placeholder=" ">
            <label for="phone">Phone</label>
          </div>
        </div>

        <div class="field">
          <div class="input-wrap">
            <input type="email" id="email" placeholder=" ">
            <label for="email">Email</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <input type="text" id="website" placeholder=" ">
            <label for="website">Website / Social Media</label>
          </div>
        </div>

      </div>
    </section>

    <!-- Section 2 — Brand Identity -->
    <section class="brief-section">
      <h2><ion-icon name="sparkles-outline"></ion-icon> Brand Identity</h2>
      <div class="fields-grid">

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="brandName" placeholder=" ">
            <label for="brandName">Brand Name</label>
          </div>
        </div>

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="tagline" placeholder=" ">
            <label for="tagline">Brand Tagline (if exists)</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="brandStory" placeholder=" "></textarea>
            <label for="brandStory">Story Behind the Name</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="service" placeholder=" "></textarea>
            <label for="service">Brand Service or Product</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="message" placeholder=" "></textarea>
            <label for="message">What is your brand message to your audience?</label>
          </div>
        </div>

      </div>
    </section>

    <!-- Section 3 — Audience -->
    <section class="brief-section">
      <h2><ion-icon name="people-outline"></ion-icon> Target Audience</h2>
      <div class="fields-grid">

        <div class="field full">
          <div class="input-wrap">
            <textarea id="audience" placeholder=" "></textarea>
            <label for="audience">Age, Gender, Lifestyle...</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="problem" placeholder=" "></textarea>
            <label for="problem">What is the audience's problem? And what solution does your brand provide?</label>
          </div>
        </div>

      </div>
    </section>

    <!-- Section 4 — Brand Personality -->
    <section class="brief-section">
      <h2><ion-icon name="color-palette-outline"></ion-icon> Brand Personality</h2>
      <div class="fields-grid">

        <div class="field full">
          <div class="input-wrap">
            <textarea id="personality" placeholder=" "></textarea>
            <label for="personality">Brand Personality (ex: Inspirational, classy, funny...)</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="values" placeholder=" "></textarea>
            <label for="values">Brand Values (ex: sustainability, equality, respect...)</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="different" placeholder=" "></textarea>
            <label for="different">What makes your brand different from competitors?</label>
          </div>
        </div>

      </div>
    </section>

    <!-- Section 5 — Competition -->
    <section class="brief-section">
      <h2><ion-icon name="podium-outline"></ion-icon> Competition & Vision</h2>
      <div class="fields-grid">

        <div class="field full">
          <div class="input-wrap">
            <textarea id="competitors" placeholder=" "></textarea>
            <label for="competitors">Top 3 Competitors</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="vision" placeholder=" "></textarea>
            <label for="vision">Vision / Future Goal of the Brand</label>
          </div>
        </div>

      </div>
    </section>

    <!-- Section 6 — Visual Preferences -->
    <section class="brief-section">
      <h2><ion-icon name="eye-outline"></ion-icon> Visual Preferences</h2>
      <div class="fields-grid">

        <div class="field full">
          <label class="static-label">Do you have a logo?</label>
          <div class="radio-group">
            <label><input type="radio" name="logo" value="yes"> Yes</label>
            <label><input type="radio" name="logo" value="no"> No</label>
          </div>
          <div class="logo-upload" id="logoUpload">
            <ion-icon name="cloud-upload-outline"></ion-icon>
            <p>Upload your logo here</p>
           <span>PNG, JPG, SVG accepted</span>
           <input type="file" id="logoFile" accept="image/*" onchange="previewLogo(this)">
           <img id="logoPreview" src="" alt="Logo Preview">
          </div>
        </div>

        <div class="field full">
  <label class="static-label">What logo type do you prefer?</label>
  <div class="logo-types">

    <label class="logo-card">
      <input type="checkbox" name="logoType" value="Wordmark">
      <div class="logo-card-inner">
        <img src="wordmark.jpg" alt="Wordmark">
        <div class="logo-card-info">
          <span class="logo-card-check"><ion-icon name="checkmark-outline"></ion-icon></span>
          <p class="logo-type-name">Wordmark</p>
          <p class="logo-type-desc">Text-based logo</p>
        </div>
      </div>
    </label>

    <label class="logo-card">
      <input type="checkbox" name="logoType" value="Monogram">
      <div class="logo-card-inner">
        <img src="monogram.jpg" alt="Monogram">
        <div class="logo-card-info">
          <span class="logo-card-check"><ion-icon name="checkmark-outline"></ion-icon></span>
          <p class="logo-type-name">Monogram</p>
          <p class="logo-type-desc">1 or more letters joined</p>
        </div>
      </div>
    </label>

    <label class="logo-card">
      <input type="checkbox" name="logoType" value="Pictogram">
      <div class="logo-card-inner">
        <img src="pictogram.jpg" alt="Pictogram">
        <div class="logo-card-info">
          <span class="logo-card-check"><ion-icon name="checkmark-outline"></ion-icon></span>
          <p class="logo-type-name">Pictogram</p>
          <p class="logo-type-desc">A picture of something real</p>
        </div>
      </div>
    </label>

    <label class="logo-card">
      <input type="checkbox" name="logoType" value="Abstract">
      <div class="logo-card-inner">
        <img src="abstract.jpg" alt="Abstract">
        <div class="logo-card-info">
          <span class="logo-card-check"><ion-icon name="checkmark-outline"></ion-icon></span>
          <p class="logo-type-name">Abstract</p>
          <p class="logo-type-desc">Shapes without clear meaning</p>
        </div>
      </div>
    </label>

    <label class="logo-card">
      <input type="checkbox" name="logoType" value="Mascot">
      <div class="logo-card-inner">
        <img src="mascot.jpg" alt="Mascot">
        <div class="logo-card-info">
          <span class="logo-card-check"><ion-icon name="checkmark-outline"></ion-icon></span>
          <p class="logo-type-name">Mascot</p>
          <p class="logo-type-desc">A cartoon character logo</p>
        </div>
      </div>
    </label>

    <label class="logo-card">
      <input type="checkbox" name="logoType" value="Emblem">
      <div class="logo-card-inner">
        <img src="emblem.jpg" alt="Emblem">
        <div class="logo-card-info">
          <span class="logo-card-check"><ion-icon name="checkmark-outline"></ion-icon></span>
          <p class="logo-type-name">Emblem</p>
          <p class="logo-type-desc">Words and pictures in one symbol</p>
        </div>
      </div>
    </label>

  </div>
</div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="visual" placeholder=" "></textarea>
            <label for="visual">Any visual preferences? (colors, fonts, brands you like...)</label>
          </div>
        </div>

      </div>
    </section>

    <!-- Section 7 — Project Parameters -->
    <section class="brief-section">
      <h2><ion-icon name="stats-chart-outline"></ion-icon> Project Parameters</h2>
      <div class="fields-grid">

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="deadline" placeholder=" ">
            <label for="deadline">Deadline / Timeline</label>
          </div>
        </div>

        <div class="field">
          <div class="input-wrap">
            <input type="text" id="budget" placeholder=" ">
            <label for="budget">Budget</label>
          </div>
        </div>

        <div class="field full">
          <div class="input-wrap">
            <textarea id="extra" placeholder=" "></textarea>
            <label for="extra">Any information you'd like to add?</label>
          </div>
        </div>

      </div>
    </section>

    <!-- Button -->
    <div class="brief-submit">
      <button onclick="sendBrief()">
        <ion-icon name="send-outline"></ion-icon>
        <span>Send Brief</span>
      </button>
    </div>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="Script.js"></script>
  <script src="Lang.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>
            </html>
