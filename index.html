<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Discovery Brief</title>
  <link rel="stylesheet" href="briefStyle.css">
</head>
<body>

  <!-- Header -->
  <header class="brief-header">
    <div class="header-left">
      <h1>BRAND DISCOVERY<br><span>BRIEF.</span></h1>
    </div>
    <div class="header-right">
      <img src="Logopic.png" alt="Logo">
      <p>Mohamed Ali Louati</p>
      <p>Brand Identity Designer</p>
    </div>
  </header>

  <!-- Form -->
  <main class="brief-form">

    <!-- Section 1 -->
    <section class="brief-section">
      <h2>01 — Client Details</h2>
      <div class="fields-grid">
        <div class="field"><label>Client's Name</label><input type="text"></div>
        <div class="field"><label>Company Name</label><input type="text"></div>
        <div class="field"><label>Phone</label><input type="text"></div>
        <div class="field"><label>Email</label><input type="email"></div>
        <div class="field full"><label>Website</label><input type="text"></div>
      </div>
    </section>

    <!-- Section 2 -->
    <section class="brief-section">
      <h2>02 — Project Details</h2>
      <div class="fields-grid">
        <div class="field full">
          <label>Do you have a logo?</label>
          <div class="radio-group">
            <label><input type="radio" name="logo" value="yes"> Yes</label>
            <label><input type="radio" name="logo" value="no"> No</label>
          </div>
        </div>
        <div class="field full"><label>Is there a tagline or call to action?</label><textarea></textarea></div>
        <div class="field full"><label>Is there a brand style-guide?</label><textarea></textarea></div>
        <div class="field full"><label>Where will the graphics appear?</label><textarea></textarea></div>
        <div class="field full"><label>Are there visual cues or motifs?</label><textarea></textarea></div>
        <div class="field full"><label>What competition are you benchmarking against?</label><textarea></textarea></div>
      </div>
    </section>

    <!-- Section 3 -->
    <section class="brief-section">
      <h2>03 — Project Parameters</h2>
      <div class="fields-grid">
        <div class="field full"><label>Objective / Goal of the Project</label><textarea></textarea></div>
        <div class="field full"><label>Target Audience</label><textarea></textarea></div>
        <div class="field"><label>Deadlines / Timeline</label><input type="text"></div>
        <div class="field"><label>Budget</label><input type="text"></div>
      </div>
    </section>

    <!-- Button -->
    <div class="brief-submit">
      <button onclick="sendBrief()">Generate PDF & Send</button>
    </div>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="Script.js"></script>

</body>
</html>
